<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro pasajero - MotoTaxi</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="login-container">
        <div class="login-box" style="max-width: 480px;">
            <div class="logo">
                <h1>🏍️ MotoTaxi</h1>
                <p>Registrarse como pasajero</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form class="form" method="post" action="/register">
                <div class="input-group">
                    <label for="name">Nombre completo</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="input-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="input-group">
                    <label for="phone">Teléfono</label>
                    <input type="tel" id="phone" name="phone">
                </div>

                <button type="submit" style="margin-top: 16px;">Registrar</button>
            </form>

            <div style="margin-top: 24px; text-align: center;">
                <p style="color: var(--text-muted); font-size: 0.9rem;">¿Ya tienes cuenta? <a href="/login" style="color: #60a5fa; text-decoration: underline;">Inicia sesión</a></p>
            </div>
        </div>
    </main>
</body>
</html>
