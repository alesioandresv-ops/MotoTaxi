{% extends "base.html" %}
{% block title %}Registro pasajero — MotoTaxi{% endblock %}
{% block content %}
<main class="auth-page">
  <div class="auth-card wide">
    <div class="auth-logo">
      <span class="icon">👤</span>
      <h1>MotoTaxi</h1>
      <p>Registrarse como pasajero</p>
    </div>

    <form class="form" method="post" action="/register">
      <div class="input-group">
        <label for="name">Nombre completo</label>
        <input type="text" id="name" name="name" required placeholder="Ej: Juan Pérez">
      </div>

      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required placeholder="tu@correo.com">
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        <div class="input-group">
          <label for="phone">Teléfono</label>
          <input type="tel" id="phone" name="phone" placeholder="300 123 4567">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block">Registrarse</button>
    </form>

    <div class="links-row">
      <p class="muted">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
    </div>
  </div>
</main>
{% endblock %}
