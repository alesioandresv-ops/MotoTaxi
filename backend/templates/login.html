{% extends "base.html" %}
{% block title %}Iniciar sesión — MotoTaxi{% endblock %}
{% block content %}
<main class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="icon">🏍️</span>
      <h1>MotoTaxi</h1>
      <p>Tu plataforma confiable de mototaxi</p>
    </div>

    <form class="form" method="post" action="/login">
      <h2>Inicia Sesión</h2>

      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" required placeholder="tu@correo.com">
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block">Inicia Sesión</button>
    </form>

    <div class="links-row">
      <p class="muted">¿No tienes cuenta?</p>
      <a href="/register">Registrarse como pasajero</a>
      <a href="/driver/register">Registrarse como conductor</a>
    </div>

    <div class="demo-section">
      <p>O prueba con cuentas demo:</p>
      <div class="demo-buttons">
        <form method="post" action="/login" style="flex:1;">
          <input type="hidden" name="email" value="pasajero@demo.com">
          <input type="hidden" name="password" value="1234">
          <button type="submit" class="demo-btn passenger">👤 Demo Pasajero</button>
        </form>
        <form method="post" action="/login" style="flex:1;">
          <input type="hidden" name="email" value="conductor@demo.com">
          <input type="hidden" name="password" value="1234">
          <button type="submit" class="demo-btn driver">🏍️ Demo Conductor</button>
        </form>
      </div>
    </div>
  </div>
</main>
{% endblock %}
