{% extends "base.html" %}
{% block title %}MotoTaxi — Tu plataforma de mototaxi{% endblock %}
{% block content %}
<main class="auth-page">
  <div class="auth-card" style="text-align:center;">
    <div class="auth-logo">
      <span class="icon">🏍️</span>
      <h1>MotoTaxi</h1>
      <p>Tu plataforma confiable de mototaxi</p>
    </div>
    <div style="display:grid;gap:14px;margin-top:32px;">
      <a href="/login" class="btn btn-primary btn-lg btn-block">Iniciar sesión</a>
      <a href="/register" class="btn btn-outline btn-block">Registrarse como pasajero</a>
      <a href="/driver/register" class="btn btn-outline btn-block">Registrarse como conductor</a>
    </div>
  </div>
</main>
{% endblock %}
