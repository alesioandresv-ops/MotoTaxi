<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoTaxi - Tu plataforma de mototaxi</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="login-container">
        <div class="login-box">
            <div class="logo">
                <h1>🏍️ MotoTaxi</h1>
                <p>Tu plataforma confiable de mototaxi</p>
            </div>

            <div style="margin: 32px 0; display: grid; gap: 14px;">
                <p style="text-align: center; color: var(--text-muted);">Elige tu rol:</p>
                <a href="/login" style="padding: 16px 20px; border-radius: 18px; background: linear-gradient(135deg, #4f46e5 0%, #8b5cf6 100%); color: white; font-weight: 700; text-align: center; transition: all 0.2s;">👤 Iniciar sesión</a>
                <a href="/register" style="padding: 16px 20px; border-radius: 18px; border: 1px solid rgba(59, 130, 246, 0.35); color: #60a5fa; background: rgba(255, 255, 255, 0.08); font-weight: 700; text-align: center; transition: all 0.2s;">Registrarse como pasajero</a>
                <a href="/driver/register" style="padding: 16px 20px; border-radius: 18px; border: 1px solid rgba(124, 58, 237, 0.35); color: #c4b5fd; background: rgba(255, 255, 255, 0.08); font-weight: 700; text-align: center; transition: all 0.2s;">Registrarse como conductor</a>
            </div>
        </div>
    </main>
</body>
</html>
