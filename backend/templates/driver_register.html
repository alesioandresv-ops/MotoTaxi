{% extends "base.html" %}
{% block title %}Registro conductor — MotoTaxi{% endblock %}
{% block content %}
<main class="auth-page">
  <div class="auth-card wide">
    <div class="auth-logo">
      <span class="icon">🏍️</span>
      <h1>MotoTaxi</h1>
      <p>Registrarse como conductor</p>
    </div>

    <form class="form" method="post" action="/driver/register">
      <h3 class="form-section-title">Información personal</h3>

      <div class="input-row">
        <div class="input-group">
          <label>Nombre completo</label>
          <input type="text" name="name" required placeholder="Ej: Carlos López">
        </div>
        <div class="input-group">
          <label>Correo electrónico</label>
          <input type="email" name="email" required placeholder="conductor@correo.com">
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>Contraseña</label>
          <input type="password" name="password" required placeholder="••••••••">
        </div>
        <div class="input-group">
          <label>Teléfono</label>
          <input type="tel" name="phone" required placeholder="300 987 6543">
        </div>
      </div>

      <h3 class="form-section-title">Información de la moto</h3>

      <div class="input-row">
        <div class="input-group">
          <label>Placa</label>
          <input type="text" name="placa" required placeholder="ABC123">
        </div>
        <div class="input-group">
          <label>Marca</label>
          <input type="text" name="moto_marca" required placeholder="Ej: Yamaha">
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>Modelo</label>
          <input type="text" name="moto_modelo" required placeholder="Ej: YZF-R3">
        </div>
        <div class="input-group">
          <label>Color</label>
          <input type="text" name="moto_color" required placeholder="Ej: Rojo">
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>Cilindrada</label>
          <input type="text" name="moto_cilindrada" required placeholder="Ej: 250cc">
        </div>
        <div class="input-group">
          <label>¿Tienes patente?</label>
          <select name="tiene_patente" required>
            <option value="">Selecciona</option>
            <option value="yes">Sí</option>
            <option value="no">No</option>
          </select>
        </div>
      </div>

      <h3 class="form-section-title">Documentos y requisitos</h3>

      <div class="input-row">
        <div class="input-group">
          <label>¿Tienes casco?</label>
          <select name="tiene_casco" required>
            <option value="">Selecciona</option>
            <option value="yes">Sí</option>
            <option value="no">No</option>
          </select>
        </div>
        <div class="input-group">
          <label>¿Tienes seguro?</label>
          <select name="seguro_moto" required>
            <option value="">Selecciona</option>
            <option value="yes">Sí</option>
            <option value="no">No</option>
          </select>
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>Tipo de seguro</label>
          <input type="text" name="tipo_seguro" required placeholder="Ej: Responsabilidad civil">
        </div>
        <div class="input-group">
          <label>Carnet de conducir</label>
          <input type="text" name="carnet_conducir" required placeholder="Número de carnet">
        </div>
      </div>

      <div class="input-group">
        <label>Último servicio realizado</label>
        <input type="text" name="ultimo_servicio" required placeholder="Descripción breve del último servicio">
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-block">Registrar como conductor</button>
    </form>

    <div class="links-row">
      <p class="muted">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
    </div>
  </div>
</main>
{% endblock %}
